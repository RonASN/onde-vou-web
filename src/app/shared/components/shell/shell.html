<div class="flex h-screen flex-col bg-background text-foreground">
  <app-header (toggleSidebar)="toggleDrawer()" />

  <div class="flex min-h-0 flex-1">

    <aside class="hidden w-56 shrink-0 border-r border-border bg-card md:block">
      <app-sidebar />
    </aside>

    @if (drawerOpen()) {
      <div
        class="fixed inset-0 z-40 bg-black/50 md:hidden"
        (click)="closeDrawer()"
        aria-hidden="true"
      ></div>
      <aside
        class="fixed inset-y-0 left-0 z-50 w-64 border-r border-border bg-card pt-16 shadow-xl md:hidden"
        role="dialog"
        aria-modal="true"
      >
        <app-sidebar (navigate)="closeDrawer()" />
      </aside>
    }

    <div class="flex min-w-0 flex-1 flex-col">
      <app-breadcrumb />
      <main class="min-h-0 flex-1 overflow-auto">
        <router-outlet />
      </main>
    </div>
  </div>
</div>
