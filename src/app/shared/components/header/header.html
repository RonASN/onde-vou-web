<header
  class="sticky top-0 z-40 flex h-16 w-full items-center gap-3 border-b border-border bg-background px-4 sm:px-6"
>
  <button
    type="button"
    (click)="onToggleSidebar()"
    class="inline-flex h-9 w-9 items-center justify-center rounded-md border border-border text-muted-foreground transition-colors hover:bg-accent hover:text-foreground md:hidden"
    aria-label="Abrir menu"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <line x1="4" x2="20" y1="6" y2="6" />
      <line x1="4" x2="20" y1="12" y2="12" />
      <line x1="4" x2="20" y1="18" y2="18" />
    </svg>
  </button>

  <a routerLink="/" class="flex items-center gap-2 text-lg font-bold text-primary">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="26"
      height="26"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
      <circle cx="12" cy="10" r="3" />
    </svg>
    <span class="hidden sm:inline">OndeVou</span>
  </a>

  <div class="ml-auto flex items-center gap-2">
    <app-theme-toggle />
    @if (auth.isAuthenticated()) {
      <app-avatar-menu />
    } @else {
      <a routerLink="/login" hlmBtn variant="ghost" size="sm">Entrar</a>
      <a routerLink="/register" hlmBtn size="sm">Cadastrar</a>
    }
  </div>
</header>
